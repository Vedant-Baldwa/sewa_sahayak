<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/vite.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#ffffff" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap"
    rel="stylesheet">
  <title>Sewa Sahayak</title>
  <style>
    /* Prevent Google Translate body shift */
    body,
    html {
      top: 0 !important;
      margin-top: 0 !important;
    }

    /* Hide google's default UI elements */
    .goog-te-banner-frame,
    .goog-te-banner-frame.skiptranslate,
    .skiptranslate>iframe,
    .goog-te-gadget-icon,
    #goog-gt-tt,
    .goog-te-balloon-frame {
      display: none !important;
    }

    /* Keep the actual element in DOM but invisible to the user */
    #google_translate_element {
      display: none;
    }
  </style>
</head>

<body>
  <div id="root"></div>

  <!-- Google Translate Target -->
  <div id="google_translate_element"></div>

  <script type="text/javascript">
    function googleTranslateElementInit() {
      new google.translate.TranslateElement({
        pageLanguage: 'en',
        includedLanguages: 'en,hi,gu,bn,mr,ta,te,kn,ml,pa,ur',
        layout: google.translate.TranslateElement.InlineLayout.SIMPLE,
        autoDisplay: false
      }, 'google_translate_element');
    }
  </script>
  <script type="text/javascript"
    src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>

  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
